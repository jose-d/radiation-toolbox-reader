image: python:3.12-alpine

run-tests:
  stage: test
  script:
  - pip install pytest
  - python3 -m pytest tests/test_reader_log.py tests/test_reader_ers.py

build-pages:
  stage: test
  script:
  - pip install -U sphinx
  - (cd docs; sphinx-build -b html source ../public)
  only:
  - branches
  except:
  - master

deploy-pages:
  stage: deploy
  script:
  - pip install -U sphinx
  - (cd docs; sphinx-build -b html source ../public)
  artifacts:
    paths:
    - public
  only:
  - master
